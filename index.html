<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing App V0.4</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #06111b;
  color: white;
  padding: 16px;
}

h1 {
  margin: 0 0 16px 0;
}

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.tabs button {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background: #123247;
  color: white;
  font-weight: bold;
}

.tabs button.active {
  background: #19c2ff;
  color: black;
}

.tab {
  display: none;
}

.tab.active {
  display: block;
}

.card {
  background: #0d1f2d;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 12px;
}

.fish-list {
  display: grid;
  gap: 10px;
}

.fish-item {
  background: #123247;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
}

.small {
  color: #9eb7c8;
  font-size: 13px;
}

button.action {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background: #19c2ff;
  color: black;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #102636;
  color: white;
  margin-bottom: 12px;
}
</style>
</head>

<body>

<h1>🎣 Fishing App</h1>

<div class="tabs">
  <button class="tabBtn active" onclick="openTab('home', this)">Home</button>
  <button class="tabBtn" onclick="openTab('fish', this)">Fish</button>
  <button class="tabBtn" onclick="openTab('legal', this)">Legal</button>
  <button class="tabBtn" onclick="openTab('map', this)">Map</button>
</div>

<div id="home" class="tab active">
  <div class="card">
    Fish search is nou in.
  </div>
</div>

<div id="fish" class="tab">
  <div class="card">
    <h3>Fish Search</h3>
    <input id="fishSearch" type="text" placeholder="Soek vis naam..." oninput="filterFish()">
  </div>

  <div class="card">
    <h3>Fish</h3>
    <div id="fishList" class="fish-list"></div>
  </div>

  <div id="fishDetailCard" class="card" style="display:none;"></div>
</div>

<div id="legal" class="tab">
  <div class="card">
    <h3>Legal Checker</h3>

    <select id="legalFish"></select>

    <input id="legalSize" type="number" placeholder="Lengte cm">

    <button class="action" onclick="checkLegal()">Check</button>

    <div id="legalResult" class="small">Nog niks gecheck nie.</div>
  </div>
</div>

<div id="map" class="tab">
  <div class="card">
    Map kom volgende.
  </div>
</div>

<script>
const fishData = [
  { name: "kob", size: 60, bag: 5, bait: "okka / chokka / sard" },
  { name: "geelstert", size: 0, bag: 10, bait: "live bait / sard / plug" },
  { name: "geelbek", size: 60, bag: 2, bait: "chokka / sard / live bait" },
  { name: "hottentot", size: 22, bag: 10, bait: "red bait / prawn / mussel" }
];

function openTab(id, btn) {
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tabBtn').forEach(button => button.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

  const fishList = document.getElementById('fishList');
  fishList.innerHTML = '';

    fishList.innerHTML = `<div class="small">Geen vis gekry nie.</div>`;
    return;
  }

    const item = document.createElement('div');
    item.className = 'fish-item';

      <span class="small">${fish.size} cm | bag ${fish.bag}</span>
