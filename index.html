
<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing App V1.4</title>

<style>
body{
margin:0;
font-family:Arial;
background:#06111b;
color:white;
}

.app{padding:12px;max-width:1000px;margin:auto;}

header{
display:flex;justify-content:space-between;align-items:center;
}

.badge{background:#00c8ff;color:black;padding:6px 10px;border-radius:15px;}

nav{
display:flex;gap:6px;margin:10px 0;
}
nav button{
flex:1;padding:10px;border:none;border-radius:10px;
background:#123247;color:white;font-weight:bold;
}
nav button.active{background:#00c8ff;color:black;}

.tab{display:none;}
.tab.active{display:block;}

.card{
background:#0a1f2e;padding:12px;margin-bottom:10px;border-radius:12px;
}

.fish-grid{
display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;
}

.fish-card{
background:#123247;padding:8px;border-radius:10px;text-align:center;cursor:pointer;
}

.fish-card img{
width:100%;height:100px;object-fit:contain;background:#0d1a24;border-radius:8px;
}

input{
width:100%;padding:8px;margin:8px 0;border-radius:8px;border:none;background:#102636;color:white;
}

button.action{
padding:10px;border:none;border-radius:10px;background:#00c8ff;color:black;font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

<header>
<h2>🎣 Fishing App</h2>
<div class="badge">V1.4</div>
</header>

<nav>
<button class="tabBtn active" onclick="tab('fish',this)">Fish</button>
<button class="tabBtn" onclick="tab('legal',this)">Legal</button>
</nav>

<!-- FISH -->
<div id="fish" class="tab active">

<div class="card">
<input id="search" placeholder="Search fish..." oninput="searchFish()">
</div>

<div class="card">
<div id="fishGrid" class="fish-grid"></div>
</div>

<div class="card" id="fishDetail" style="display:none;"></div>

</div>

<!-- LEGAL -->
<div id="legal" class="tab">

<div class="card">
<select id="legalFish"></select>
<input type="number" id="legalSize" placeholder="Lengte (cm)">
<button class="action" onclick="checkLegal()">Check</button>
<div id="result"></div>
</div>

</div>

</div>

<script>

// TAB
function tab(id,btn){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("active");
btn.classList.add("active");
}

// FULL FISH LIST
const fish = [
{name:"kob", size:50, bag:5, img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Argyrosomus_japonicus.jpg"},
{name:"geelstert", size:0, bag:10, img:"https://upload.wikimedia.org/wikipedia/commons/0/0c/Seriola_lalandi.jpg"},
{name:"geelbek", size:60, bag:2, img:"https://upload.wikimedia.org/wikipedia/commons/8/89/Atractoscion_aequidens.jpg"},
{name:"hottentot", size:22, bag:10, img:"https://upload.wikimedia.org/wikipedia/commons/2/27/Pachymetopon_aeneum.jpg"},
{name:"red roman", size:30, bag:5, img:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Chrysoblephus_latifrons.jpg"},
{name:"dageraad", size:40, bag:1, img:"https://upload.wikimedia.org/wikipedia/commons/f/f5/Chrysoblephus_cristiceps.jpg"},
{name:"santer", size:30, bag:5, img:"https://upload.wikimedia.org/wikipedia/commons/3/3d/Cheimerius_nufar.jpg"},
{name:"elf", size:30, bag:4, img:"https://upload.wikimedia.org/wikipedia/commons/3/32/Pomatomus_saltatrix.jpg"},
{name:"bonito", size:0, bag:10, img:"https://upload.wikimedia.org/wikipedia/commons/7/7c/Sarda_sarda.jpg"},
{name:"poensie", size:30, bag:5, img:"https://upload.wikimedia.org/wikipedia/commons/6/65/Petrus_rupestris.jpg"},
{name:"carpenter", size:30, bag:5, img:"https://upload.wikimedia.org/wikipedia/commons/4/4d/Argyrozona_argyrozona.jpg"},
{name:"miss lucy", size:25, bag:5, img:"https://upload.wikimedia.org/wikipedia/commons/1/1d/Pagrus_auratus.jpg"},
{name:"yellowbelly rockcod", size:30, bag:5, img:"https://upload.wikimedia.org/wikipedia/commons/9/9c/Epinephelus_marginatus.jpg"}
];

// LOAD FISH
function loadFish(list=fish){
let grid=document.getElementById("fishGrid");
grid.innerHTML="";

list.forEach(f=>{
let d=document.createElement("div");
d.className="fish-card";

d.innerHTML=`
<img src="${f.img}">
<b>${f.name}</b><br>
${f.size}cm | ${f.bag}
`;

d.onclick=()=>showFish(f);
grid.appendChild(d);
});
}

// SEARCH
function searchFish(){
let q=document.getElementById("search").value.toLowerCase();
let filtered=fish.filter(f=>f.name.includes(q));
loadFish(filtered);
}

// DETAIL
function showFish(f){
let box=document.getElementById("fishDetail");
box.style.display="block";

box.innerHTML=`
<h3>${f.name}</h3>
<img src="${f.img}" style="width:100%">
<p>Min size: ${f.size} cm</p>
<p>Bag limit: ${f.bag}</p>
<button onclick="back()">Back</button>
`;
}

function back(){
document.getElementById("fishDetail").style.display="none";
}

// LEGAL DROPDOWN
function loadLegal(){
let sel=document.getElementById("legalFish");
sel.innerHTML=fish.map(f=>`<option>${f.name}</option>`).join("");
}

// LEGAL CHECK
function checkLegal(){
let name=document.getElementById("legalFish").value;
let size=document.getElementById("legalSize").value;

let f=fish.find(x=>x.name===name);

if(size>=f.size){
document.getElementById("result").innerText="✔ Wettig";
}else{
document.getElementById("result").innerText="❌ Te klein";
}
}

// INIT
loadFish();
loadLegal();

</script>

</body>
  </html>
