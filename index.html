<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing App V0.4.2</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #06111b;
  color: white;
  padding: 16px;
}

h1 { margin: 0 0 16px 0; }

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.tabs button {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background: #123247;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.tabs button.active {
  background: #19c2ff;
  color: black;
}

.tab { display: none; }
.tab.active { display: block; }

.card {
  background: #0d1f2d;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 12px;
}

.fish-list {
  display: grid;
  gap: 10px;
}

.fish-item {
  background: #123247;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
}

.small {
  color: #9eb7c8;
  font-size: 13px;
}

button.action {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background: #19c2ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #102636;
  color: white;
  margin-bottom: 12px;
}
</style>
</head>

<body>

<h1>🎣 Fishing App</h1>

<div class="tabs">
  <button class="tabBtn active" data-tab="home">Home</button>
  <button class="tabBtn" data-tab="fish">Fish</button>
  <button class="tabBtn" data-tab="legal">Legal</button>
  <button class="tabBtn" data-tab="map">Map</button>
</div>

<!-- HOME -->
<div id="home" class="tab active">
  <div class="card">Home werk.</div>
</div>

<!-- FISH -->
<div id="fish" class="tab">
  <div class="card">
    <h3>Fish Search</h3>
    <input id="fishSearch" placeholder="Soek vis...">
  </div>

  <div class="card">
    <div id="fishList" class="fish-list"></div>
  </div>

  <div id="fishDetailCard" class="card" style="display:none;"></div>
</div>

<!-- LEGAL -->
<div id="legal" class="tab">
  <div class="card">
    <h3>Legal</h3>
    <select id="legalFish"></select>
    <input id="legalSize" type="number" placeholder="Lengte cm">
    <button class="action" id="checkBtn">Check</button>
    <div id="legalResult"></div>
  </div>
</div>

<!-- MAP -->
<div id="map" class="tab">
  <div class="card">
    <h3>Map</h3>
    Map werk nou ✔
  </div>
</div>

<script>

const fishData = [
  { name: "kob", size: 60, bag: 5 },
  { name: "geelstert", size: 0, bag: 10 },
  { name: "geelbek", size: 60, bag: 2 },
  { name: "hottentot", size: 22, bag: 10 }
];

function openTab(id){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tabBtn').forEach(b => b.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  document.querySelector(`[data-tab="${id}"]`).classList.add('active');
}

document.querySelectorAll('.tabBtn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    openTab(btn.getAttribute('data-tab'));
  });
});

// FISH
function renderFish(list = fishData){
  const box = document.getElementById('fishList');
  box.innerHTML = '';

  list.forEach(f=>{
    let d = document.createElement('div');
    d.className = 'fish-item';
    d.innerHTML = `${f.name}<br><span class="small">${f.size} cm | ${f.bag}</span>`;
    d.onclick = ()=>showFish(f);
    box.appendChild(d);
  });
}

function showFish(f){
  let d = document.getElementById('fishDetailCard');
  d.style.display = 'block';
  d.innerHTML = `
    <h3>${f.name}</h3>
    ${f.size} cm<br>
    bag ${f.bag}<br><br>
    <button onclick="hideFish()">Back</button>
  `;
}

function hideFish(){
  document.getElementById('fishDetailCard').style.display='none';
}

document.getElementById('fishSearch').addEventListener('input', ()=>{
  let q = document.getElementById('fishSearch').value.toLowerCase();
  let filtered = fishData.filter(f=>f.name.includes(q));
  renderFish(filtered);
});

// LEGAL
function loadLegal(){
  let sel = document.getElementById('legalFish');
  sel.innerHTML = fishData.map(f=>`<option>${f.name}</option>`).join('');
}

document.getElementById('checkBtn').onclick = ()=>{
  let name = document.getElementById('legalFish').value;
  let size = Number(document.getElementById('legalSize').value);
  let f = fishData.find(x=>x.name===name);

  if(size >= f.size){
    document.getElementById('legalResult').innerHTML = "✔ Wettig";
  } else {
    document.getElementById('legalResult').innerHTML = "❌ Te klein";
  }
};

renderFish();
loadLegal();

</script>

</body>
</html>
