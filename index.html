<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing App V0.5</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #06111b;
  color: white;
  padding: 16px;
}

h1 { margin: 0 0 16px 0; }

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.tabs button {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background: #123247;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.tabs button.active {
  background: #19c2ff;
  color: black;
}

.tab { display: none; }
.tab.active { display: block; }

.card {
  background: #0d1f2d;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 12px;
}

.fish-list {
  display: grid;
  gap: 10px;
}

.fish-item {
  background: #123247;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
}

.small {
  color: #9eb7c8;
  font-size: 13px;
}

button.action {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background: #19c2ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #102636;
  color: white;
  margin-bottom: 12px;
}
</style>
</head>

<body>

<h1>🎣 Fishing App</h1>

<div class="tabs">
  <button class="tabBtn active" data-tab="home">Home</button>
  <button class="tabBtn" data-tab="fish">Fish</button>
  <button class="tabBtn" data-tab="legal">Legal</button>
  <button class="tabBtn" data-tab="map">Map</button>
</div>

<div id="home" class="tab active">
  <div class="card">
    Meer Stilbaai-visse is nou in. Die basis bly eenvoudig sodat niks breek nie.
  </div>
</div>

<div id="fish" class="tab">
  <div class="card">
    <h3>Fish Search</h3>
    <input id="fishSearch" placeholder="Soek vis naam...">
  </div>

  <div class="card">
    <h3>Fish</h3>
    <div id="fishList" class="fish-list"></div>
  </div>

  <div id="fishDetailCard" class="card" style="display:none;"></div>
</div>

<div id="legal" class="tab">
  <div class="card">
    <h3>Legal Checker</h3>
    <select id="legalFish"></select>
    <input id="legalSize" type="number" placeholder="Lengte cm">
    <button class="action" id="checkBtn">Check</button>
    <div id="legalResult" class="small">Nog niks gecheck nie.</div>
  </div>
</div>

<div id="map" class="tab">
  <div class="card">
    <h3>Map</h3>
    Map bly nog eenvoudig in hierdie stap.
  </div>
</div>

<script>
const fishData = [
  { name: "kob", local: "kob", size: 60, bag: 1, bait: "okka / chokka / sard" },
  { name: "geelstert", local: "geelstert", size: 0, bag: 10, bait: "live bait / sard / plug" },
  { name: "geelbek", local: "geelbek", size: 60, bag: 2, bait: "chokka / sard / live bait" },
  { name: "hottentot", local: "hottentot", size: 22, bag: 10, bait: "red bait / prawn / mussel" },
  { name: "roman", local: "red roman / roman", size: 30, bag: 2, bait: "okka / sard / chokka" },
  { name: "dageraad", local: "dageraad", size: 40, bag: 1, bait: "okka / red bait" },
  { name: "santer", local: "santer", size: 30, bag: 5, bait: "okka / sard strips" },
  { name: "elf", local: "elf / shad", size: 30, bag: 4, bait: "sard / spoon / plug" },
  { name: "bonito", local: "bonito", size: 0, bag: 10, bait: "small lure / feather / spoon" },
  { name: "poensie", local: "poensie", size: 0, bag: 10, bait: "okka / sard" },
  { name: "carpenter", local: "silverfish / carpenter", size: 35, bag: 4, bait: "okka strips / sard" },
  { name: "miss lucy", local: "miss lucy / red stumpnose", size: 30, bag: 1, bait: "okka / sard" },
  { name: "yellowbelly rockcod", local: "yellowbelly rockcod", size: 60, bag: 1, bait: "okka / sard" }
];

function openTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tabBtn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelector(`.tabBtn[data-tab="${id}"]`).classList.add('active');
}

document.querySelectorAll('.tabBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    openTab(btn.getAttribute('data-tab'));
  });
});

function renderFish(list = fishData){
  const box = document.getElementById('fishList');
  box.innerHTML = '';

  if (!list.length) {
    box.innerHTML = `<div class="small">Geen vis gekry nie.</div>`;
    return;
  }

  list.forEach(f => {
    let d = document.createElement('div');
    d.className = 'fish-item';
    d.innerHTML = `
      <strong>${f.local}</strong><br>
      <span class="small">${f.size} cm | bag ${f.bag}</span>
    `;
    d.onclick = () => showFish(f);
    box.appendChild(d);
  });
}

function showFish(f){
  let d = document.getElementById('fishDetailCard');
  d.style.display = 'block';
  d.innerHTML = `
    <h3>${f.local}</h3>
    <p><strong>English / reference name:</strong> ${f.name}</p>
    <p><strong>Minimum size:</strong> ${f.size} cm</p>
    <p><strong>Bag limit:</strong> ${f.bag}</p>
    <p><strong>Bait:</strong> ${f.bait}</p>
    <button class="action" id="backFishBtn">Back</button>
  `;

  document.getElementById('backFishBtn').addEventListener('click', hideFish);
}

function hideFish(){
  document.getElementById('fishDetailCard').style.display = 'none';
}

document.getElementById('fishSearch').addEventListener('input', () => {
  let q = document.getElementById('fishSearch').value.toLowerCase().trim();
  let filtered = fishData.filter(f =>
    f.name.toLowerCase().includes(q) ||
    f.local.toLowerCase().includes(q)
  );
  renderFish(filtered);
});

function loadLegal(){
  let sel = document.getElementById('legalFish');
  sel.innerHTML = fishData.map(f => `<option value="${f.name}">${f.local}</option>`).join('');
}

document.getElementById('checkBtn').onclick = () => {
  let name = document.getElementById('legalFish').value;
  let size = Number(document.getElementById('legalSize').value);
  let f = fishData.find(x => x.name === name);

  if (!f || !size) {
    document.getElementById('legalResult').innerHTML = "Tik eers lengte in.";
    return;
  }

  if (f.size === 0 || size >= f.size) {
    document.getElementById('legalResult').innerHTML =
      `✔ Wettig<br>${f.local}<br>Min size: ${f.size} cm<br>Bag: ${f.bag}`;
  } else {
    document.getElementById('legalResult').innerHTML =
      `❌ Te klein<br>${f.local}<br>Min size: ${f.size} cm<br>Jou vis: ${size} cm`;
  }
};

renderFish();
loadLegal();
</script>

</body>
</html>
