<!DOCTYPE html>
<html lang="af">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06111b;
      color: white;
      padding: 16px;
    }

    h1 {
      margin-top: 0;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tabs button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #123247;
      color: white;
      font-weight: bold;
    }

    .tabs button.active {
      background: #19c2ff;
      color: black;
    }

    .tab {
      display: none;
      background: #0d1f2d;
      padding: 16px;
      border-radius: 12px;
    }

    .tab.active {
      display: block;
    }
  </style>
</head>
<body>
  <h1>Fishing App Test</h1>

  <div class="tabs">
    <button class="tabBtn active" onclick="openTab('home', this)">Home</button>
    <button class="tabBtn" onclick="openTab('fish', this)">Fish</button>
    <button class="tabBtn" onclick="openTab('map', this)">Map</button>
  </div>

  <div id="home" class="tab active">
    Home werk.
  </div>

  <div id="fish" class="tab">
    Fish werk.
  </div>

  <div id="map" class="tab">
    Map werk.
  </div>

  <script>
    function openTab(id, btn) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tabBtn').forEach(button => button.classList.remove('active'));

      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }
  </script>
</body>
</html>
